apiVersion: v1
kind: Pod
metadata:
  name: mock-log-generator
  namespace: default
  labels:
    app: mock-log-generator
spec:
  containers:
  - name: log-producer
    image: busybox:1.36
    command: ["/bin/sh", "-c"]
    args:
    - |
      while true; do
        echo "{\"level\":\"info\", \"message\":\"User authentication successful\", \"service\":\"auth-service\", \"status\":200}"
        sleep 1
        echo "{\"level\":\"warn\", \"message\":\"Database connection pool reaching threshold\", \"service\":\"db-service\"}"
        sleep 2
        echo "{\"level\":\"error\", \"message\":\"Failed to process payment transaction\", \"service\":\"payment-gateway\", \"code\":500}"
        sleep 3
      done