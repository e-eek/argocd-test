apiVersion: apps/v1
kind: Deployment
metadata:
  name: json-log-generator
  namespace: lgtm-test
  labels:
    app: json-logger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: json-logger
  template:
    metadata:
      labels:
        app: json-logger
    spec:
      containers:
      - name: logger
        image: busybox:1.36
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # A script that spits out valid JSON log lines
        args:
        - /bin/sh
        - -c
        - >
          while true; do
            # Generate a normal successful request log
            echo "{\"time\":\"$(date -u +%FT%TZ)\", \"level\":\"INFO\", \"method\":\"GET\", \"path\":\"/api/v1/users\", \"status\":200, \"duration_ms\":$((RANDOM%150+20))}";
            sleep 1;
            
            # 10% chance to generate a random application error log
            if [ $((RANDOM%10)) -eq 0 ]; then
              echo "{\"time\":\"$(date -u +%FT%TZ)\", \"level\":\"ERROR\", \"method\":\"POST\", \"path\":\"/api/v1/payments\", \"status\":500, \"duration_ms\":$((RANDOM%800+400)), \"error\":\"Database connection pool exhausted\"}";
            fi
            sleep 1;
          done