apiVersion: v1
kind: Pod
metadata:
  name: test-log-generator
  namespace: argocd # Deploying it directly into your test tenant
  labels:
    app: fake-auth-service
spec:
  containers:
  - name: logger
    image: busybox:1.36
    # This script prints mock logs to standard output infinitely
    args:
    - /bin/sh
    - -c
    - >
      while true; do
        echo "INFO: $(date) - User login attempt successful from IP 192.168.1.$((RANDOM%255))";
        sleep 2;
      done